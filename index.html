<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>United Rhythms and Visions presents The Rhythms of the Hearts Band</title>
  <style>
    body{
      margin:0;
      background:#0b0b0f;
      color:#f4f4f4;
      font-family: Arial, Helvetica, sans-serif;
      line-height:1.5;
    }

    .page{
      width:92%;
      max-width:1100px;
      margin:0 auto;
      padding:32px 0 48px;
    }

    .nav{
      margin-bottom:24px;
      text-align:right;
    }

    .nav a{
      color:#f4f4f4;
      text-decoration:none;
      margin-left:18px;
      font-weight:bold;
    }

    .nav a:hover{ text-decoration:underline; }

    .hero{ margin-bottom:36px; }

    .logo-row{
      overflow:hidden;
      margin-bottom:24px;
    }

    .logo{
      float:left;
      width:130px;
      margin-right:22px;
    }

    .logo img{
      display:block;
      width:100%;
      height:auto;
    }

    .title-block{
      overflow:hidden;
      padding-top:10px;
    }

    .eyebrow{
      font-size:14px;
      margin-bottom:4px;
      color:#cccccc;
    }

    .main-title{
      font-size:36px;
      font-weight:bold;
      line-height:1.1;
      margin:0 0 8px;
    }

    .sub-title{
      font-size:28px;
      font-weight:bold;
      line-height:1.15;
      margin:0;
    }

    .video-wrap{
      margin-top:22px;
      background:#111;
      border:1px solid #2a2a2a;
      padding:12px;
    }

    .video-embed{
      position:relative;
      width:100%;
      padding-top:56.25%;
      background:#000;
    }

    .video-embed iframe{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      border:0;
    }

    h2{
      font-size:28px;
      margin:0 0 16px;
      border-bottom:1px solid #333;
      padding-bottom:8px;
    }

    .contact{
      margin-bottom:40px;
      padding:16px;
      background:#111;
      border:1px solid #2a2a2a;
    }

    .band-wrap{ margin-top:10px; }

    .card{
      overflow:hidden;
      margin-bottom:18px;
      padding:16px;
      background:#111;
      border:1px solid #2a2a2a;
    }

    .headshot{
      float:left;
      width:240px;
      margin-right:18px;
      margin-bottom:10px;
    }

    .headshot img{
      display:block;
      width:100%;
      height:auto;
      border:1px solid #333;
    }

    .bio h3{
      margin:0 0 4px;
      font-size:24px;
    }

    .role{
      margin:0 0 12px;
      font-weight:bold;
      color:#d6d6d6;
    }

    .bio p{
      margin:0 0 12px;
      color:#e6e6e6;
    }

    .footer-image{ margin-top:28px; }

    .footer-image img{
      display:block;
      width:100%;
      height:auto;
      border:1px solid #2a2a2a;
    }

    .clearfix:after{
      content:"";
      display:block;
      clear:both;
    }

    @media (max-width: 700px){
      .logo{
        float:none;
        width:120px;
        margin:0 0 16px 0;
      }

      .title-block{
        overflow:visible;
        padding-top:0;
      }

      .main-title{ font-size:28px; }
      .sub-title{ font-size:22px; }

      .headshot{
        float:none;
        width:100%;
        max-width:320px;
        margin:0 0 14px 0;
      }

      .nav{ text-align:left; }

      .nav a{
        display:inline-block;
        margin:0 12px 8px 0;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="nav">
      <a href="#top">Home</a>
      <a href="#contact">Contact</a>
      <a href="#band">The Band</a>
    </div>

    <div class="hero" id="top">
      <div class="logo-row clearfix">
        <div class="logo">
          <img src="united-rhythms--logo.png" alt="United Rhythms and Visions" width="320" height="320"/>
        </div>
        <div class="title-block">
          <div class="main-title">UNITED RHYTHMS AND VISIONS</div>
          <div class="eyebrow">presents</div>
          <div class="sub-title">THE RHYTHMS OF THE HEARTS BAND</div>
        </div>
      </div>

      <div class="video-wrap">
        <div class="video-embed">
          <iframe
            src="https://www.youtube.com/embed/Cx9Ib4IaeMI?rel=0&modestbranding=1"
            title="The Rhythms of the Hearts Band"
            loading="lazy"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen></iframe>
        </div>
      </div>
    </div>

    <div id="contact">
      <h2>Contact</h2>
      <div class="contact">
        For bookings, contact Luis de Jesús at 732-632-7214
      </div>
    </div>

    <div id="band">
      <h2>The Band</h2>
      <div class="band-wrap" id="band-wrap"></div>
    </div>

    <div class="footer-image">
      <img src="band-stage-wide.jpg" alt="The Band (stage)" loading="lazy" width="1200" height="383"/>
    </div>
  </div>

  <script>
    const membersRaw = [
      {
        name: "Luis de Jesús",
        role: "Composer, Arranger, Multi-Instrumentalist",
        img: "Luis-de-Jesus.jpg",
        bio: `Luis De Jesús is a composer, arranger, and multi-instrumentalist whose work bridges tradition, innovation, and cultural storytelling. Trained across a remarkable range of disciplines (from jazz guitar, Puerto Rican cuatro, conga and barril drums to charango, Chinese harp, and classical Indian music), he brings a richly global perspective to every performance and composition. As Executive Director of United Rhythms and Visions, he has spent decades designing and leading arts programs that inspire creativity, diversity, and connection through music, rhythm, and interdisciplinary expression. A dynamic educator and producer as well as a seasoned performer, Luis is known for creating music that is both deeply rooted and vibrantly alive.

Luis de Jesús is also the Executive Director of United Rhythms and Visions, where he has spent decades using the arts to inspire learning, inclusion, and community connection. Since 1999, he has led innovative interdisciplinary programs for schools and youth, blending music, storytelling, visual arts, and cultural education to promote acceptance, harmony, and diversity. A multidisciplinary artist and educator with deep training in music, visual arts, and performance traditions, Luis brings a rare mix of creative vision and hands-on leadership to every project. His work reflects a lifelong commitment to empowering young people through the transformative power of the arts.`
      },
      {
        name: "Jeremy Leon",
        role: "Music Director",
        img: "Jeremy-Leon.jpg",
        bio: `Currently based in New Jersey, Montreal native Jeremy Leon is making his name in the East Coast scene as a dynamic new performer and composer in the jazz tradition. He has caught the attention of many as a torchbearer for impassioned artistic practice among Canadian jazz's up-and-comers, as a bandleader, featured soloist, and sideman. Jeremy's broad tone and fresh sense of phrasing have been heard in performances across Quebec with mainstays of the scene, such as Alexandre Côté, Jean-Pierre Zanella, Alex Bellegarde, Caity Gyorgy and countless others.

He has performed in concert venues all across the Eastern Seaboard, from New Jersey to New York, Pennsylvania, Connecticut, Quebec and Ontario. Jeremy's original compositions never fail to catch the listener's ear whilst paying homage to his inspirations: John Coltrane, Sonny Rollins and Joe Henderson. His debut album as a leader, Affinity, was released to positive press in March 2024. He has also performed in award-winning acts on the periphery of the jazz idiom, like Rau_ze and Diogo Ramos.

Jeremy recently obtained his masters degree in Jazz Studies from the Mason Gross School of the Arts at Rutgers University, studying with mainstays of the New York jazz scene, such as Abraham Burton, Ralph Bowen, Conrad Herwig, and Robby Ameen. At McGill University, he was the recipient of the David Holt Award for excellence in the field of jazz studies, and studying with Camille Thurman, Rémi Bolduc and Frank Lozano.`
      },
      {
        name: 'José "Cheo" Aponte',
        role: "Multi-percussionist",
        img: "Cheo-Aponte.jpg",
        bio: `José “Cheo” Aponte is a seasoned multi-percussionist whose rhythm-driven journey began in the Bronx, New York, when he started playing at age 16. Largely self-taught, Cheo developed his craft through passion, instinct, and the priceless opportunity to learn by playing alongside greats like neighborhood legend Cachete Maldonado.

Music runs deep in his roots. His mother sang on the radio, and his cousin was an original member, composer, saxophonist, and singer for the iconic El Gran Combo de Puerto Rico. Over the years, Cheo has performed with a wide range of bands and artists, studied in a percussion workshop with the legendary Max Roach at the University of Massachusetts, and shared musical experiences with notable names like Archie Shepp and Vishnu Woods. He also did studio work during the disco era and performed with Gary Nuñez of Plena Libre and Sunshine Logroño as part of Moliendo Vidrio.

Today, Cheo brings his rich experience, deep groove, and spiritual passion to Rhythm of the Hearts, using music and song as both expression and praise.`
      },
      {
        name: "Jose Austin",
        role: "Guitarist",
        img: "Jose-Austin.jpg",
        bio: `Jose Austin is a dynamic guitarist whose musical journey began early, shaped by his father’s love of guitar and the soulful sounds of the blues. Born in Guatemala and adopted into the U.S. at just nine months old, Jose grew up surrounded by music, with B.B. King’s Bluesville playing in the house and a guitar always close at hand.

He first picked up the ukulele at sixteen before quickly transitioning to guitar, where his passion truly took off. Driven by a love of learning songs by ear and channeling the artists who inspired him, Jose spent years honing his craft before stepping onto the live scene at his first open jam. That leap led him to Luis and eventually to The Rhythm of the Hearts Band, where he was introduced to polyrhythms and Latin music (an experience that expanded his sound and transformed his approach as a musician).

Now a proud member of The Rhythm of the Hearts Band, Jose brings heart, growth, and gratitude to every performance. Excited for what’s ahead, he continues to evolve as an artist while creating powerful music alongside a talented collective of musicians.`
      },
      {
        name: "Andrew Rosenkilde",
        role: "Pianist",
        img: "Andrew-Rosenkilde.jpg",
        bio: `Andrew Rosenkilde is a professional pianist, organist, composer, and educator based in the Philadelphia area. He was a student of Paul Zeigler in NYC and of Orrin Evans at Rutgers University. He can be found performing at venues and festivals such as City Winery, Chris' Jazz Cafe, World Cafe Live, and the Exit Zero Jazz Festival; he also serves as a church pianist and organist, and as the accompanist for various choral organizations in northern NJ. Andrew has played with musicians such as Abraham Burton, Josh Lawrence, Allison Crockett, and Orrin Evans, and was honored to be the co-writer and arranger for the music in the Hudson Hall production of NPR’s “No Cowards in Our Band”.`
      },
      {
        name: "Anthony Salvador Lewis",
        role: "Vocalist",
        img: "Anthony-Salvador-Lewis.jpg",
        bio: `Anthony Salvador Lewis’s path to the stage began with a sudden pivot. A serious knee injury (sustained while he was a standout running back at a Central Jersey high school) forced him to step away from dreams of Olympic competition as a world-class high hurdler and a future in the NFL. At the urging of his mother (who could see he was uninspired by a college business major), Anthony discovered a new kind of purpose: singing and acting (especially in the theater).

What followed were years of hard-earned, unpredictable, and unforgettable work in show business. Anthony built a reputation as a dynamic actor, a frontman for New Jersey club bands, and a popular solo performer, including performances for Filipino audiences in the U.S. and abroad. His single “Amsterdam” can be heard on major streaming platforms.

A graduate of the Lee Strasberg Theatre & Film Institute and HB Studio in New York City, Anthony has appeared in guest and co-starring roles on television series including The Blacklist, Billions, and Comedy Central’s Chappelle’s Show and Alternatino (as the Shaman Utuqiel). He has shared the screen with acclaimed actors such as James Spader, Paul Giamatti, Arturo Castro, and Edie Falco.

Anthony considers it a true honor to work with the consummate artist, composer, and song sculptor Luis de Jesús and his dedicated, handpicked ensemble of top-caliber musicians.`
      },
      {
        name: "Breeze Waker",
        role: "Drummer",
        img: "Breeze-Waker.jpg",
        bio: `Breeze Waker is a seasoned drummer whose love of music started young, inspired by family records, television performers, and a lifelong dream of playing the stage with a great band. Deeply rooted in the sounds of the ’50s, ’60s, and ’70s, Breeze brings a rich, versatile style shaped by blues, rock ’n’ roll, soul, funk, fusion, jazz, reggae, and R&B.

Over the years, he has played with a wide range of local bands and recording artists, including Bill Carter Blues Project, The Mighty Tone Masters, Special Occasion, The Street People, Nu-Era, The Mighty Strokes, Love Epidemic Band, Sonny & Company, No Regrets Band, Gus Bardaji Band, and Willie Mitchell collaborations. His performance history includes sharing stages with legendary acts such as The Persuaders, Hugh Masekela, Blue Magic, Harold Melvin & The Blue Notes, Johnny Clyde Copeland, Snooky Pryor, Homesick James, and Dave Valentin.

From 2000 to 2009, Breeze led his own group, The Breeze Waker Band, featuring Ms. Frankie Bell, known as the Princess of the Blues, and performed in standout events including the Jersey Shore Jazz & Blues Foundation competition at the Wonder Bar in Asbury Park. Today, he continues to keep the groove alive with Ms. G & Da Guys, The Rhythms of the Hearts Band, and The Nu Men of Soul, delivering classic soul and R&B with the power and experience only a true veteran can bring.`
      },
      {
        name: "Caleb Eckstein",
        role: "Trombonist",
        img: "caleb-eckstein.jpg",
        bio: `Caleb Eckstein is a trombonist, composer, and arranger based in New Jersey. He is a 2020 graduate of Northwestern University, double majoring in Neuroscience and Jazz Performance. He has performed or recorded with Sabina Sciubba, the Men of Soul, Warren Wolf, Brianna Thomas, and Benny Bennack III. In addition to being a freelance musician, Caleb has recently released albums with the Constellation Big Band, a full piece jazz orchestra that he co-leads with NYC drummer Jared Decker.`
      },
      {
        name: "Carlos Hernandez",
        role: "Trumpetist",
        img: "carlos-hernandez.jpg",
        bio: `Carlos Hernandez is a rising trumpetist and dedicated educator, currently in his fifth year at Rutgers Mason Gross School of the Arts, where he is pursuing dual majors in Music Education and Jazz Studies. A versatile performer, he has spent the past four years making his mark in the Rutgers Marching Band, jazz ensemble, concert band, brass band, and pep band.

As trumpet section leader for the Marching Scarlet Knights, Carlos has performed on major stages, including the Macy’s Thanksgiving Day Parade and London Band Week, where he represented the United States. Proficient on trumpet, flugelhorn, cornet, and piano, he brings a dynamic musical voice to every setting. Beyond the stage, he has spent the last three years assisting music teachers in New Brunswick, Edison, and Metuchen, while also gigging regularly in Latin jazz, salsa, reggae, hip-hop fusion, and funk. Passionate about both performance and teaching, Carlos also enjoys giving lessons in trumpet and music theory as he prepares to complete his student teaching in Piscataway.`
      },
      {
        name: "Charlie Martinez",
        role: "Multi-percussionist",
        img: "Charlie-Martinez.jpg",
        bio: `Charlie Martinez is a versatile multi-percussionist whose passion for rhythm began in his teens, inspired by his brother Chuck’s timbales gigs and the legendary sound of the Fania All-Stars. Over the years, he has built his style through rich musical experiences, performing with acclaimed artists and learning a wide range of Afro-Latin rhythms along the way.

Charlie has played with renowned cuatro player Tuto Feliciano, known for his work on Puerto Rican radio, and performed with the band La Sonica, which featured notable talents including Junior Gonzales of Larry Harlow fame, acclaimed trombonist Jimmy Bosch, and vocalist Herman Olivera, known for singing with Eddie Palmieri. With deep roots, strong influences, and heartfelt gratitude for the journey, Charlie brings authenticity, energy, and seasoned musicianship to every performance.`
      },
      {
        name: "Daniel Karnaukh",
        role: "Pianist",
        img: "Daniel-Karnaukh.jpg",
        bio: `A jazz pianist based and gigging in the NJ/NY/PA area, Daniel fuses his multifaceted musical background with all style of music he plays.

Graduating with his Bachelor of Music from Oberlin Conservatory in 2024, he is currently completing his Master of Music at Rutgers University Mason Gross, under the tutelage of Orrin Evans.

Whether it be swing, RnB, salsa, or fusion, Daniel enjoys bringing his colorful playing to all kinds of performances. He is extremely excited to be a part of the band and honored to contribute to this music!`
      },
      {
        name: "Ed Washington",
        role: "Master Bass Player",
        img: "Ed-Washington.jpg",
        bio: `Ed Washington is a versatile bassist, percussionist, vocalist, guitarist, and arranger with more than three decades of experience performing throughout the Tri-State area. A graduate of the Newark Community School of the Arts, where he studied bass, music theory, and performance under mentors Hayes Johnson and Calvin Hughes, he continued his musical development through extensive self-study and professional workshops.

He has performed at numerous venues, festivals, and community events, including Americana Park Café, Nell’s, Sullivan Room, Copeland’s, Newark Symphony Hall, the Hudson River Museum, and Liberty State Park. Over the years, he has collaborated with a wide range of vocalists, spoken word artists, and bands spanning jazz, R&B, funk, Latin jazz, and blues. His long-running associations include BGT-112, Bungo’s Highlife, Alsamarol, Rhythm of the Hearts, and Punjab and Company, among others.

In addition to live performances and recordings featured on various CDs and YouTube videos, he occasionally works as a DJ, curating playlists and music for venues and restaurants across the region.`
      },
      {
        name: "Eddie Ellis",
        role: "Master Bass Player",
        img: "Eddie-Ellis.jpg",
        bio: `Born in New York City to a musician father, Eddie Ellis was raised in East Harlem and cut his teeth playing in a range of R&B and funk bands before falling hard for jazz in high school.

He studied music theory at Hunter College and built on the foundation he learned at home, while also performing and studying with keyboardists Ross Carnegie and Jimmy Sigler. Eddie performed for over ten years with The Ex-Zib-Its Steel Band, and for the past six years has continued to bring deep groove and steady artistry to The Chuck Lambert Band.`
      },
      {
        name: "Jacob Hurlock",
        role: "Pianist",
        img: "Jacob-Hurlock.jpg",
        bio: `Jacob Hurlock is a New Jersey-based pianist with a dynamic, genre-crossing sound that blends straight-ahead jazz, fusion, hip hop, and rich Afro-Caribbean and Afro-Brazilian influences. Performing across New Jersey, Philadelphia, and New York City, he brings versatility, groove, and a fresh musical voice to every stage he plays.`
      },
      {
        name: "Kyle Courter",
        role: "Trombonist",
        img: "kyle-Courter.jpg",
        bio: `Kyle Courter is a full time artist of jazz and Afro-Caribbean music. His main instrument is trombone, however he also has fun playing percussion instruments like güiro and barril. He is currently in his 5th year at Mason Gross School of the Arts studying towards a bachelor's of jazz performance and music education. He performs in venues throughout New Jersey, Pennsylvania, and New York. His favorite artists to listen to vary among bomba, plena, and jazz: William Cepeda, Ismael Rivera (Maelo) w/Rafael Cortijo, Pleneros de la 21, Tito Matos w/Viento de Agua, Hermanos Ayala, Alma Moyo, J.J Johnson, and Wayne Shorter.`
      }
    ];

    function slugId(name){
      return name
        .toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
        .replace(/[^a-z0-9\s-]/g,'')
        .trim()
        .replace(/\s+/g,'-');
    }

    function cleanBioText(s){
      return (s || "")
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .replace(/\u00A0/g, " ")
        .split("\n")
        .map(function(line){
          return line.replace(/[ \t]{2,}/g, " ").replace(/\s+$/g, "");
        })
        .join("\n")
        .trim();
    }

    function lastName(name){
      const cleaned = name.replace(/["“”]/g,'').trim();
      const parts = cleaned.split(/\s+/);
      return (parts[parts.length - 1] || "").toLowerCase();
    }

    const luis = membersRaw.find(function(m){ return m.name === "Luis de Jesús"; });
    const jeremy = membersRaw.find(function(m){ return m.name === "Jeremy Leon"; });

    const rest = membersRaw
      .filter(function(m){ return m !== luis && m !== jeremy; })
      .sort(function(a, b){
        return lastName(a.name).localeCompare(lastName(b.name));
      });

    const members = []
      .concat(luis ? [luis] : [])
      .concat(jeremy ? [jeremy] : [])
      .concat(rest);

    const bandWrap = document.getElementById("band-wrap");

    members.forEach(function(m){
      const card = document.createElement("div");
      card.className = "card clearfix";
      card.id = "m-" + slugId(m.name);

      const headshot = document.createElement("div");
      headshot.className = "headshot";

      const img = document.createElement("img");
      img.src = m.img;
      img.alt = m.name;
      img.loading = "lazy";
      headshot.appendChild(img);

      const bio = document.createElement("div");
      bio.className = "bio";

      const h3 = document.createElement("h3");
      h3.appendChild(document.createTextNode(m.name));

      const role = document.createElement("div");
      role.className = "role";
      role.appendChild(document.createTextNode(m.role));

      bio.appendChild(h3);
      bio.appendChild(role);

      const parts = cleanBioText(m.bio).split(/\n\s*\n/);
      parts.forEach(function(block){
        const p = document.createElement("p");
        p.appendChild(document.createTextNode(block.replace(/\n/g, " ")));
        bio.appendChild(p);
      });

      card.appendChild(headshot);
      card.appendChild(bio);
      bandWrap.appendChild(card);
    });
  </script>
</body>
</html>
