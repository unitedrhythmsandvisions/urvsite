<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>United Rhythms and Visions presents The Rhythms of the Hearts band</title>
<style>
    :root{
      --bg0:#06060a;
      --bg1:#0c1020;
      --fg:#f6f7ff;
      --muted:rgba(246,247,255,.75);
      --glass:rgba(255,255,255,.08);
      --glass2:rgba(255,255,255,.12);
      --stroke:rgba(255,255,255,.18);
      --shadow: 0 24px 60px rgba(0,0,0,.55);
      --shadow2: 0 16px 40px rgba(0,0,0,.45);
      --r:18px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      color:var(--fg);
      background:
        radial-gradient(1100px 720px at 18% 6%, rgba(255,198,52,.28), transparent 60%),
        radial-gradient(900px 640px at 92% 10%, rgba(0,173,255,.18), transparent 62%),
        radial-gradient(900px 700px at 30% 96%, rgba(255,54,140,.14), transparent 64%),
        radial-gradient(900px 650px at 90% 92%, rgba(0,186,120,.12), transparent 64%),
        linear-gradient(180deg, var(--bg0) 0%, var(--bg1) 55%, #070711 100%);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      overflow-x:hidden;
    }

    /* subtle moving “bomba / plena” vibe without external assets */
    .aurora{
      position:fixed; inset:-20vmax;
      pointer-events:none;
      filter: blur(40px) saturate(1.25);
      opacity:.38;
      mix-blend-mode: screen;
      animation: drift 18s ease-in-out infinite alternate;
      background:
        radial-gradient(closest-side at 20% 40%, rgba(255,206,60,.9), transparent 62%),
        radial-gradient(closest-side at 75% 25%, rgba(0,215,255,.8), transparent 65%),
        radial-gradient(closest-side at 62% 80%, rgba(255,60,160,.75), transparent 60%),
        radial-gradient(closest-side at 35% 85%, rgba(95,255,160,.75), transparent 62%);
    }
    @keyframes drift{
      from{transform: translate3d(-2%, -1%, 0) rotate(-3deg) scale(1.02)}
      to{transform: translate3d(2%, 1.5%, 0) rotate(3deg) scale(1.06)}
    }

    /* fixed hover nav */
    .nav{
      position:fixed;
      top:18px;
      right:18px;
      z-index:50;
      display:flex;
      flex-direction:row;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      justify-content:flex-end;
      padding:10px 12px;
      border-radius:18px;
      background:rgba(10,10,16,.58);
      border:1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,.45);
    }
    .nav a{
      color:var(--fg);
      text-decoration:none;
      font-weight:800;
      letter-spacing:.2px;
      padding:10px 14px;
      border-radius:999px;
      position:relative;
      isolation:isolate;
      opacity:.92;
      transition: transform .2s ease, opacity .2s ease;
      display:block;
      width:auto;
      text-align:center;
    }
    .nav a::before{
      content:"";
      position:absolute; inset:0;
      border-radius:999px;
      background:
        linear-gradient(90deg,
          rgba(255,206,60,.35),
          rgba(255,60,160,.26),
          rgba(0,215,255,.20),
          rgba(95,255,160,.22));
      opacity:0;
      transform: scale(.96);
      transition: opacity .2s ease, transform .2s ease;
      z-index:-1;
    }
    .nav a:hover{transform: translateY(-1px); opacity:1}
    .nav a:hover::before{opacity:1; transform:scale(1)}

/* layout */
    main{width:min(1200px, 92vw); margin:0 auto; padding:96px 0 96px}
    section{padding:52px 0}
    .section-title{
      font-size: clamp(22px, 2.3vw, 30px);
      margin:0 0 18px;
      letter-spacing:.2px;
    }

    /* hero */
    .hero{
      padding-top:10px;
    }
        .hero-grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:18px;
      align-items:start;
    }


    .brand{
      background: transparent;
      border: none;
      box-shadow: none;
      overflow: visible;
      position:relative;
    }
    .brand-inner{padding:0}

.logo-row{display:flex; gap:24px; align-items:center; margin-bottom:14px}
        .logo{
      width:150px;
      height:auto;
      background: transparent;
      border:none;
      border-radius:0;
      display:block;
      overflow:visible;
      flex:0 0 auto;
      filter: drop-shadow(0 16px 26px rgba(0,0,0,.22));
    }
    .logo img{width:100%; height:auto; object-fit:contain; display:block}

h1{
      margin:0;
      font-size: clamp(26px, 3vw, 40px);
      line-height:1.07;
      letter-spacing:.1px;
      text-wrap:balance;
    }

    .hero-sub{
      margin:14px 0 0;
      color:var(--muted);
      font-size: 15px;
      line-height:1.55;
    }

    /* video card */
    .video-card{
      border-radius: calc(var(--r) + 8px);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      border:1px solid rgba(255,255,255,.16);
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
    }

    .video-frame{
      aspect-ratio: 16/9;
      width:100%;
      position:relative;
      background: #000;
      overflow:hidden;
      cursor:pointer;
    }

    .poster{
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:cover;
      transform: scale(1.02);
      filter: saturate(1.1) contrast(1.05);
      transition: transform .45s ease, filter .45s ease;
    }
    .video-frame:hover .poster{transform: scale(1.07); filter:saturate(1.25) contrast(1.08)}

    .poster-sheen{
      position:absolute; inset:-30%;
      background: linear-gradient(120deg,
        transparent 20%,
        rgba(255,255,255,.14) 35%,
        rgba(255,255,255,.06) 55%,
        transparent 70%);
      transform: translateX(-35%) rotate(6deg);
      opacity:0;
      transition: opacity .25s ease;
      pointer-events:none;
    }
    .video-frame:hover .poster-sheen{
      opacity:1;
      animation: sheen 1.2s ease forwards;
    }
    @keyframes sheen{
      0%{transform: translateX(-35%) rotate(6deg)}
      100%{transform: translateX(35%) rotate(6deg)}
    }

    .play{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      pointer-events:none;
    }

    .play-btn{
      width:84px; height:84px;
      border-radius:999px;
      background: rgba(6,6,10,.55);
      border: 1px solid rgba(255,255,255,.22);
      box-shadow: var(--shadow2);
      display:grid;
      place-items:center;
      transform: translateY(0) rotate(0deg);
      transition: transform .28s cubic-bezier(.2,.9,.2,1);
      position:relative;
      overflow:hidden;
    }

    /* animated ring */
    .play-btn::before{
      content:"";
      position:absolute; inset:-3px;
      border-radius:999px;
      background: conic-gradient(from 0deg,
        rgba(255,206,60,.9),
        rgba(255,60,160,.8),
        rgba(0,215,255,.85),
        rgba(95,255,160,.85),
        rgba(255,206,60,.9));
      filter: blur(.2px);
      opacity:.55;
      animation: spin 3.2s linear infinite;
      mask: radial-gradient(circle at center, transparent 61%, #000 62%);
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    .video-frame:hover .play-btn{
      transform: translateY(-7px) rotate(-6deg) scale(1.02);
    }

    .triangle{
      width:0; height:0;
      border-top: 14px solid transparent;
      border-bottom: 14px solid transparent;
      border-left: 22px solid rgba(246,247,255,.92);
      transform: translateX(3px);
      filter: drop-shadow(0 6px 12px rgba(0,0,0,.35));
    }

    .video-meta{padding:14px 16px; color:var(--muted); font-size:14px; line-height:1.45}

    /* contact */
    .contact{
      border-radius: calc(var(--r) + 8px);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      border:1px solid rgba(255,255,255,.16);
      box-shadow: var(--shadow2);
      padding:22px 20px;
    }
    .contact p{margin:0; font-size: 16px; line-height:1.5}

    /* band */
    .band-wrap{
      display:grid;
      gap:14px;
    }

    .card{
      position:relative;
      border-radius: calc(var(--r) + 10px);
      background:
        radial-gradient(800px 220px at 15% 10%, rgba(255,206,60,.18), transparent 60%),
        radial-gradient(700px 260px at 85% 20%, rgba(0,215,255,.16), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      border:1px solid rgba(255,255,255,.16);
      box-shadow: var(--shadow2);
      overflow:hidden;
    }

    .card-inner{
      display:grid;
      grid-template-columns: 280px 1fr;
      gap:18px;
      padding:18px;
      align-items:stretch;
    }

    @media (max-width: 860px){
      .card-inner{display:block; overflow:hidden; padding:18px;}
      /* “storybook chapter” drop-cap image: square crop that trims bottom (and a touch of right) */
      .headshot{
        float:left;
        width:140px !important;
        height:140px !important;
        aspect-ratio:1/1;
        min-height:0 !important;
        margin:0 16px 10px 0;
      }
      .headshot img{
        width:100%;
        height:100%;
        object-fit:cover;
        object-position:40% 0%;
      }
    }

    @media (max-width: 400px){
      .headshot{float:none; width:100% !important; aspect-ratio:16/9; height:auto; min-height:0 !important; margin:0 0 14px 0;}
      .headshot img{object-position:center 35%;}
    }

    .headshot{
      border-radius: calc(var(--r) + 8px);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.18);
      position:relative;
      background:rgba(255,255,255,.06);
      min-height: 320px;
    }
    .headshot img{width:100%; height:100%; object-fit:cover; display:block; transform:scale(1.01); transition: transform .55s ease}
    .card:hover .headshot img{transform:scale(1.08)}
.bio h3{
      margin:0 0 6px;
      font-size: 22px;
      letter-spacing:.15px;
    }
    .role{margin:0 0 12px; color:rgba(246,247,255,.82); font-weight:650}
    .bio p.bio-par{hyphens:auto; text-align:justify; 
      margin:0 0 10px;
      color: rgba(246,247,255,.80);
      line-height:1.55;
      font-size: 14.75px;
      text-align: justify;
      text-justify: inter-word;
      hyphens: auto;
      white-space: normal;
    }

    /* reveal */
    .reveal{opacity:0; transform: translateY(16px);}
    .reveal.is-in{opacity:1; transform: translateY(0); transition: opacity .7s ease, transform .7s ease;}

    footer{
      padding:30px 0 0;
      color:rgba(246,247,255,.55);
      font-size: 12px;
    }

    /* anchor offset for fixed nav */
    .anchor{scroll-margin-top: 96px;}
  </style>
</head>

<script>
    // Vimeo embed
    const VIMEO_URL = "https://player.vimeo.com/video/846838559?autoplay=1";

    const videoFrame = document.getElementById('video-frame');

    function mountVimeo(){
      const iframe = document.createElement('iframe');
      iframe.src = VIMEO_URL;
      iframe.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture');
      iframe.setAttribute('allowfullscreen', '');
      iframe.style.position = 'absolute';
      iframe.style.inset = '0';
      iframe.style.width = '100%';
      iframe.style.height = '100%';
      iframe.style.border = '0';

      // Clear poster layer
      videoFrame.innerHTML = "";
      videoFrame.style.cursor = 'auto';
      videoFrame.appendChild(iframe);
    }

    videoFrame.addEventListener('click', mountVimeo);
    videoFrame.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter' || e.key === ' ') mountVimeo();
    });

      {

        bio: `Breeze Waker is a seasoned drummer whose love of music started young, inspired by family records, television performers, and a lifelong dream of playing the stage with a great band. Deeply rooted in the sounds of the ’50s, ’60s, and ’70s, Breeze brings a rich, versatile style shaped by blues, rock ’n’ roll, soul, funk, fusion, jazz, reggae, and R&B.

Over the years, he has played with a wide range of local bands and recording artists, including Bill Carter Blues Project, The Mighty Tone Masters, Special Occasion, The Street People, Nu-Era, The Mighty Strokes, Love Epidemic Band, Sonny & Company, No Regrets Band, Gus Bardaji Band, and Willie Mitchell collaborations. His performance history includes sharing stages with legendary acts such as The Persuaders, Hugh Masekela, Blue Magic, Harold Melvin & The Blue Notes, Johnny Clyde Copeland, Snooky Pryor, Homesick James, and Dave Valentin.

From 2000 to 2009, Breeze led his own group, The Breeze Waker Band, featuring Ms. Frankie Bell, known as the Princess of the Blues, and performed in standout events including the Jersey Shore Jazz & Blues Foundation competition at the Wonder Bar in Asbury Park. Today, he continues to keep the groove alive with Ms. G & Da Guys, The Rhythms of the Hearts Band, and The Nu Men of Soul, delivering classic soul and R&B with the power and experience only a true veteran can bring.`
      },
      {
        name: "Ed Washington",
        role: "Substitute Master Bass Player",
        img: "Ed Washington.jpeg",
        bio: `Ed Washington is a versatile bassist, percussionist, vocalist, guitarist, and arranger with more than three decades of experience performing throughout the Tri-State area. A graduate of the Newark Community School of the Arts, where he studied bass, music theory, and performance under mentors Hayes Johnson and Calvin Hughes, he continued his musical development through extensive self-study and professional workshops.

He has performed at numerous venues, festivals, and community events, including Americana Park Café, Nell’s, Sullivan Room, Copeland’s, Newark Symphony Hall, the Hudson River Museum, and Liberty State Park. Over the years, he has collaborated with a wide range of vocalists, spoken word artists, and bands spanning jazz, R&B, funk, Latin jazz, and blues. His long-running associations include BGT-112, Bungo’s Highlife, Alsamarol, Rhythm of the Hearts, and Punjab and Company, among others.

In addition to live performances and recordings featured on various CDs and YouTube videos, he occasionally works as a DJ, curating playlists and music for venues and restaurants across the region.`
      },
    ];

    const bandWrap = document.getElementById('band-wrap');

    function memberCard(m){
      const card = document.createElement('article');
      card.className = 'card reveal';

      const inner = document.createElement('div');
      inner.className = 'card-inner';

      const head = document.createElement('div');
      head.className = 'headshot';

      const img = document.createElement('img');
      img.src = m.img;
      img.alt = m.name;
      head.appendChild(img);
const bio = document.createElement('div');
      bio.className = 'bio';

      const h3 = document.createElement('h3');
      h3.textContent = m.name;

      const role = document.createElement('p');
      role.className = 'role';
      role.textContent = m.role;

      function cleanBioText(s){
      return (s || "")
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .replace(/\u00A0/g, " ")
        .split("\n")
        .map(line => line.replace(/[ \t]{2,}/g, " ").replace(/\s+$/g, ""))
        .join("\n")
        .trim();
    }

    const cleaned = cleanBioText(m.bio);
    const parts = cleaned.split(/\n\s*\n/);

    bio.appendChild(h3);
    bio.appendChild(role);

    parts.forEach(block=>{
      const p = document.createElement('p');
      p.className = 'bio-par';

      const lines = block.split(/\n/);
      lines.forEach((ln, idx)=>{
        p.appendChild(document.createTextNode(ln));
        if(idx < lines.length - 1) p.appendChild(document.createElement('br'));
      });

      bio.appendChild(p);
    });

      inner.appendChild(head);
      inner.appendChild(bio);

      card.appendChild(inner);
      return card;
    }

        function lastName(name){
      const cleaned = name.replace(/["“”]/g,'').trim();
      const parts = cleaned.split(/\s+/);
      return (parts[parts.length-1] || "").toLowerCase();
    }

    const luis = membersRaw.find(m => m.name.toLowerCase().startsWith('luis'));
    const rest = membersRaw.filter(m => m !== luis).sort((a,b)=> lastName(a.name).localeCompare(lastName(b.name)));
    const members = luis ? [luis, ...rest] : rest;

    members.forEach(m => bandWrap.appendChild(memberCard(m)));
// Scroll reveal
    const io = new IntersectionObserver((entries)=>{
      for(const e of entries){
        if(e.isIntersecting) e.target.classList.add('is-in');
      }
    }, {threshold: 0.12});

    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
  </script>
</body>
</html>
